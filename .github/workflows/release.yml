name: Go Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: gk-anytype-migration

jobs:
  build:
    name: Build Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            suffix: linux
          - os: windows-latest
            suffix: windows.exe
          - os: macos-latest
            suffix: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'

      - name: Build
        run: |
          go build -v -o "$APP_NAME-${{ github.ref_name }}-${{ matrix.suffix }}" .

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: $APP_NAME-${{ github.ref_name }}-${{ matrix.suffix }}
          path: $APP_NAME-${{ github.ref_name }}-${{ matrix.suffix }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: ./binaries
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: $APP_NAME ${{ github.ref_name }}
          files: ./binaries/*
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}